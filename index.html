<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Edu+AU+VIC+WA+NT+Hand:wght@400..700&family=Playwrite+CU:wght@100..400&display=swap" rel="stylesheet">
    <title>Postcard Test</title>
    <link rel="stylesheet" href="css/styles.css"> <!-- Linking external CSS file -->
</head>
<body>
    <div class="postcard-form">
        <div class="top-section">
            <div class="left">
                <h1>My postcard</h1>
            </div>
            <div class="right">
                <img src="https://storage.googleapis.com/breathecode-asset-images/5318bde604cf5c915f94897a71b49ab2523101322ea21cb046db1e67c24fa3be.png?raw=true" alt="Postcard Image" width="35%">
            </div>
        </div>
        <div class="middle-section">
            <div class="left">
                <p>Look how awesome! This is a postcard that I created using HTML5 and CSS3 during my 4Geeks Academy Course!</p>
        <p>This is so cool, can't wait to start doing more stuff!</p>
            </div>
            <div class="right">
                <input type="name" placeholder="Some name">
                <input type="email" placeholder="Some email">
                <input type="comment" placeholder="Some comment">
            </div>
        </div>
        <div class="bottom-section">
            <button>Send my postcard</button>
        </div>
    </div>
</body>
</html>
